<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detector Bugado</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* MENU */
.menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: #111;
    padding: 10px;
    text-align: center;
}

.menu button {
    margin: 5px;
    padding: 10px;
    background: purple;
    color: white;
    border: none;
    cursor: pointer;
}

/* SEÇÕES */
.section {
    display: none;
    padding-top: 80px;
    text-align: center;
}

.active {
    display: block;
}

/* IMG */
img {
    width: 250px;
    border-radius: 20px;
    animation: zoom 2s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.2) rotate(3deg); }
}

/* TEXTO */
.glitch {
    font-size: 40px;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 2px red; }
    50% { text-shadow: -2px -2px blue; }
    100% { text-shadow: 2px -2px green; }
}

/* POPUP */
.popup {
    position: fixed;
    background: black;
    border: 2px solid red;
    color: red;
    padding: 20px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
}
</style>
</head>

<body>

<div class="menu">
    <button onclick="show('home')">Home</button>
    <button onclick="show('analise')">Análise</button>
    <button onclick="show('imagem')">Imagem</button>
    <button onclick="virus()">FINAL 😈</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <h1 class="glitch">Detector de Aura BUGADO</h1>
    <p>Resultados podem estar completamente errados 💀</p>
</div>

<!-- ANALISE -->
<div id="analise" class="section">
    <h1>Análise</h1>
    <p>⚠ Sistema confuso</p>
    <p>⚠ Energia não detectada</p>
    <p>⚠ Resultado: ???</p>
</div>

<!-- IMAGEM -->
<div id="imagem" class="section">
    <h1>Imagem analisada</h1>
    <img src="foto.png">
</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<!-- SOM -->
<audio id="som" loop>
    <source src="https://www.myinstants.com/media/sounds/windows-error.mp3">
</audio>

<script>
function show(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(Math.random() > 0.7){
        alert("⚠ SISTEMA BUGOU");
    }
}

function virus(){
    let popup = document.getElementById("popup");
    popup.style.display = "block";
    document.getElementById("som").play();

    let count = 0;

    let intervalo = setInterval(() => {
        let div = document.createElement("div");
        div.style.position = "absolute";
        div.style.left = Math.random()*window.innerWidth + "px";
        div.style.top = Math.random()*window.innerHeight + "px";
        div.style.color = "red";
        div.innerText = "ERRO NO SISTEMA";
        document.body.appendChild(div);

        count++;

        if(count > 40){
            clearInterval(intervalo);
            popup.innerHTML = "💀 SISTEMA TOTALMENTE QUEBRADO 💀";
        }
    }, 100);
}

/* efeito aleatório */
setInterval(() => {
    if(Math.random() > 0.85){
        document.body.style.background = "darkred";
        setTimeout(()=> document.body.style.background="black", 200);
    }
}, 1000);
</script>

</body>
</html>
